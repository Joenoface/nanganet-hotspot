<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NangaNet • Admin</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="logo">
            <i class="fa-solid fa-wifi fa-3x"></i>
            <h1>NangaNet</h1>
        </div>
        <h2>Admin Panel</h2>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="admin2026" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-primary">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- MAIN ADMIN PANEL (hidden at first) -->
<div id="adminPanel" class="admin-panel hidden">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-wifi fa-2x"></i>
            <div>
                <h3>NangaNet</h3>
                <small>Hotspot Admin</small>
            </div>
        </div>

        <nav>
            <a href="#" class="nav-item active" data-tab="dashboard">
                <i class="fa-solid fa-gauge"></i> Dashboard
            </a>
            <a href="#" class="nav-item" data-tab="payments">
                <i class="fa-solid fa-money-bill-wave"></i> Payments
            </a>
            <a href="#" class="nav-item" data-tab="vouchers">
                <i class="fa-solid fa-ticket"></i> Vouchers
            </a>
            <a href="#" class="nav-item" id="createVoucherBtn">
                <i class="fa-solid fa-plus"></i> Create Voucher
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="top-bar">
            <h2 id="pageTitle">Dashboard</h2>
            <button id="refreshBtn" class="refresh-btn">
                <i class="fa-solid fa-arrows-rotate"></i> Refresh
            </button>
        </div>

        <div class="content-area">

            <!-- DASHBOARD -->
            <div id="dashboard" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon teal"><i class="fa-solid fa-wallet"></i></div>
                        <div class="stat-value" id="totalRevenue">KSh 0</div>
                        <div class="stat-label">Total Revenue</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fa-solid fa-calendar-day"></i></div>
                        <div class="stat-value" id="todayRevenue">KSh 0</div>
                        <div class="stat-label">Today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fa-solid fa-ticket"></i></div>
                        <div class="stat-value" id="totalVouchers">0</div>
                        <div class="stat-label">Total Vouchers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon teal"><i class="fa-solid fa-circle-check"></i></div>
                        <div class="stat-value" id="activeVouchers">0</div>
                        <div class="stat-label">Active</div>
                    </div>
                </div>
            </div>

            <!-- PAYMENTS -->
            <div id="payments" class="tab-content hidden">
                <div class="filters">
                    <input type="text" id="paymentSearch" placeholder="Search phone or transaction..." class="search-input">
                    <select id="paymentStatus">
                        <option value="all">All Status</option>
                        <option value="success">Success</option>
                        <option value="pending">Pending</option>
                        <option value="failed">Failed</option>
                    </select>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Phone</th>
                            <th>Amount</th>
                            <th>Duration</th>
                            <th>Transaction ID</th>
                            <th>Receipt</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsBody"></tbody>
                </table>
            </div>

            <!-- VOUCHERS -->
            <div id="vouchers" class="tab-content hidden">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Amount</th>
                            <th>Duration</th>
                            <th>Expiry</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="vouchersBody"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- CREATE VOUCHER MODAL -->
<div id="createModal" class="modal hidden">
    <div class="modal-content">
        <h3>Create Manual Voucher</h3>
        <span class="close" id="closeModal">&times;</span>

        <form id="createForm">
            <div class="form-group">
                <label>Amount (KSh)</label>
                <input type="number" id="amount" value="50" min="10" required>
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" id="duration" value="60" min="10" required>
            </div>
            <button type="submit" class="btn-primary">Generate</button>
        </form>

        <div id="createResult"></div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="admin-script.js"></script>
</body>
</html>
