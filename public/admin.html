<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NangaNet • Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 flex min-h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r border-slate-100 flex flex-col lg:block hidden" id="sidebar">
    <div class="p-8 border-b">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-700 to-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">N</div>
        <div class="text-3xl font-bold tracking-tighter">NangaNet</div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-1">
      <a onclick="showTab(0)" id="nav-0" class="nav-item flex items-center gap-3 px-6 py-4 rounded-3xl text-slate-700 hover:bg-slate-100 font-medium cursor-pointer active">
        <i class="fa-solid fa-receipt"></i> Payments
      </a>
      <a onclick="showTab(1)" id="nav-1" class="nav-item flex items-center gap-3 px-6 py-4 rounded-3xl text-slate-700 hover:bg-slate-100 font-medium cursor-pointer">
        <i class="fa-solid fa-key"></i> Vouchers
      </a>
      <a onclick="showTab(2)" id="nav-2" class="nav-item flex items-center gap-3 px-6 py-4 rounded-3xl text-slate-700 hover:bg-slate-100 font-medium cursor-pointer">
        <i class="fa-solid fa-plus"></i> Manual Voucher
      </a>
    </nav>
    <div class="p-4 border-t">
      <button onclick="logout()" class="w-full py-4 flex items-center justify-center gap-3 text-red-600 hover:bg-red-50 rounded-3xl font-medium">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1">
    <div class="p-6 lg:p-10">
      <!-- Top Bar -->
      <div class="flex justify-between items-center mb-10">
        <h1 id="page-title" class="text-3xl font-semibold text-slate-900">Payments</h1>
        <div class="flex items-center gap-4">
          <button onclick="refreshAll()" class="flex items-center gap-2 text-teal-600 hover:text-teal-700 font-medium">
            <i class="fa-solid fa-arrows-rotate"></i> Refresh
          </button>
          <button onclick="exportCSV()" class="px-6 py-3 bg-white border border-slate-200 hover:border-slate-300 rounded-3xl text-sm font-medium flex items-center gap-2">
            <i class="fa-solid fa-download"></i> Export CSV
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div id="stats" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-12"></div>

      <!-- Tabs Content -->
      <div id="tab-content-0"></div>
      <div id="tab-content-1" class="hidden"></div>
      <div id="tab-content-2" class="hidden max-w-lg"></div>
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
