<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NangaNet • Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .nav-link { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-link:hover { background-color: #f8fafc; }
    .active-nav { background-color: #f1f5f9; border-left: 4px solid #1e40af; }
  </style>
</head>
<body class="bg-slate-50 flex min-h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r border-slate-100 flex flex-col">
    <div class="p-8 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-indigo-700 rounded-2xl flex items-center justify-center text-white font-bold text-3xl">N</div>
        <div>
          <span class="font-semibold text-3xl tracking-tighter text-slate-900">NangaNet</span>
        </div>
      </div>
      <p class="text-teal-600 text-sm font-medium tracking-widest mt-1">Enterprise Hotspot</p>
    </div>

    <div class="flex-1 px-3 py-6">
      <div onclick="showTab(0)" class="nav-link active-nav cursor-pointer flex items-center gap-3 px-6 py-4 rounded-2xl text-slate-700 font-medium" id="nav-0">
        <i class="fa-solid fa-credit-card w-5"></i>
        <span>Payments</span>
      </div>
      <div onclick="showTab(1)" class="nav-link cursor-pointer flex items-center gap-3 px-6 py-4 rounded-2xl text-slate-700 font-medium mt-1" id="nav-1">
        <i class="fa-solid fa-key w-5"></i>
        <span>Vouchers</span>
      </div>
      <div onclick="showTab(2)" class="nav-link cursor-pointer flex items-center gap-3 px-6 py-4 rounded-2xl text-slate-700 font-medium mt-1" id="nav-2">
        <i class="fa-solid fa-plus w-5"></i>
        <span>Create Manual Voucher</span>
      </div>
    </div>

    <div class="p-6 border-t border-slate-100">
      <button onclick="logout()" 
              class="w-full flex items-center justify-center gap-3 py-4 text-red-600 hover:bg-red-50 rounded-3xl font-medium transition-colors">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Logout</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1">
    <!-- Top Nav -->
    <div class="bg-white border-b border-slate-100 px-10 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h1 class="text-2xl font-semibold text-slate-900" id="page-title">Payments Overview</h1>
      </div>
      <div class="flex items-center gap-8 text-sm">
        <div class="flex items-center gap-2 text-slate-400">
          <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
          Live
        </div>
        <div class="text-slate-400">March 02, 2026</div>
      </div>
    </div>

    <div class="p-10">
      <!-- Stats Row -->
      <div class="grid grid-cols-5 gap-6 mb-12" id="stats"></div>

      <!-- Tab Contents -->
      <div id="tab-content-0">
        <div class="flex gap-4 mb-8">
          <div class="flex-1 relative">
            <input id="payment-search" placeholder="Search by phone or transaction ID..." 
                   class="w-full pl-12 py-4 bg-white border border-slate-200 focus:border-teal-400 rounded-3xl outline-none text-sm"
                   onkeyup="loadPayments()">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
          </div>
          <select id="status-filter" onchange="loadPayments()" 
                  class="bg-white border border-slate-200 px-6 py-4 rounded-3xl outline-none text-sm">
            <option value="all">All Payments</option>
            <option value="success">Success</option>
            <option value="pending">Pending</option>
            <option value="failed">Failed</option>
          </select>
        </div>
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden" id="payments-table-container"></div>
      </div>

      <div id="tab-content-1" class="hidden">
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden" id="vouchers-table-container"></div>
      </div>

      <div id="tab-content-2" class="hidden max-w-lg">
        <div class="bg-white rounded-3xl shadow-sm p-10">
          <h3 class="text-xl font-semibold mb-8 flex items-center gap-3">
            <span class="text-teal-500">✦</span> Create Manual Voucher
          </h3>
          <div class="space-y-8">
            <div>
              <label class="text-sm font-medium text-slate-600 block mb-2">Amount (KES)</label>
              <input id="manual-amount" type="number" class="w-full px-6 py-4 border border-slate-200 focus:border-teal-500 rounded-3xl">
            </div>
            <div>
              <label class="text-sm font-medium text-slate-600 block mb-2">Duration (minutes)</label>
              <input id="manual-duration" type="number" class="w-full px-6 py-4 border border-slate-200 focus:border-teal-500 rounded-3xl">
            </div>
            <button onclick="createManualVoucher()" 
                    class="w-full bg-indigo-700 hover:bg-indigo-800 py-5 rounded-3xl text-white font-semibold text-lg transition-all active:scale-[0.985]">
              Generate & Push to MikroTik
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer Credit -->
    <div class="text-center py-6 text-xs text-slate-400 border-t border-slate-100">
      Developed by <span class="text-indigo-700 font-medium">NangaNet Systems</span>
      <span class="inline-block w-1 h-1 bg-teal-500 rounded-full mx-1.5"></span>
      Smart Digital Solutions • 2026
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
