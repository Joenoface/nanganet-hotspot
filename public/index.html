<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NangaNet • Hotspot Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tail-container { max-width: 480px; }
    .card-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <!-- Top Bar -->
  <div class="bg-white border-b border-slate-100 py-4">
    <div class="tail-container mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-700 rounded-2xl flex items-center justify-center text-white font-bold text-xl">N</div>
        <div>
          <span class="font-semibold text-2xl tracking-tight text-slate-900">NangaNet</span>
          <span class="text-teal-500 text-sm font-medium tracking-widest block -mt-1">HOTSPOT</span>
        </div>
      </div>
      <div class="text-xs text-slate-400 font-medium">Secure • Instant • Reliable</div>
    </div>
  </div>

  <div class="tail-container mx-auto px-6 py-10 flex-1">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-slate-900 tracking-tighter">Get Online Instantly</h1>
      <p class="mt-2 text-slate-600">Pay with M-Pesa • Receive voucher in seconds</p>
    </div>

    <!-- Package Selection -->
    <div id="package-screen">
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center gap-2">
          <span class="w-2 h-2 bg-teal-500 rounded-full"></span>
          Choose Package
        </h2>
        <div id="packages" class="grid grid-cols-1 gap-4"></div>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">M-Pesa Phone Number</label>
          <div class="relative">
            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-teal-500">
              <i class="fa-solid fa-mobile-screen"></i>
            </div>
            <input id="phone" type="tel" maxlength="12" placeholder="0712345678"
                   class="w-full pl-12 pr-5 py-4 bg-white border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 rounded-3xl outline-none transition-all text-lg">
          </div>
        </div>

        <button onclick="initiatePayment()" id="payBtn"
                class="w-full bg-indigo-700 hover:bg-indigo-800 active:scale-[0.985] text-white font-semibold py-5 rounded-3xl text-xl shadow-sm flex items-center justify-center gap-3 transition-all">
          <span>Pay KES</span>
          <span id="payAmount" class="font-bold">0</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Status Screen -->
    <div id="status-screen" class="hidden">
      <div class="bg-white rounded-3xl shadow-sm p-10 text-center">
        <div id="status-icon" class="mx-auto w-20 h-20 flex items-center justify-center mb-6"></div>
        <div id="status-text" class="text-2xl font-semibold text-slate-900 mb-2"></div>
        <p id="status-sub" class="text-slate-500"></p>

        <div id="voucher" class="hidden mt-10 bg-slate-50 rounded-2xl p-8 border border-slate-100">
          <div class="flex justify-center mb-6">
            <div class="px-6 py-2 bg-emerald-100 text-emerald-700 rounded-full text-sm font-medium inline-flex items-center gap-2">
              <i class="fa-solid fa-check-circle"></i>
              PAYMENT CONFIRMED
            </div>
          </div>
          <div class="grid grid-cols-2 gap-6 text-left">
            <div>
              <div class="text-xs tracking-widest text-slate-500 font-medium">USERNAME</div>
              <div id="v-username" class="font-mono text-2xl font-semibold text-slate-900 mt-1"></div>
            </div>
            <div>
              <div class="text-xs tracking-widest text-slate-500 font-medium">PASSWORD</div>
              <div id="v-password" class="font-mono text-2xl font-semibold text-slate-900 mt-1"></div>
            </div>
          </div>
          <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <div class="text-xs text-slate-500">Expires</div>
            <div id="v-expiry" class="font-medium text-slate-700"></div>
          </div>
        </div>

        <button onclick="location.reload()" 
                class="mt-10 w-full py-4 text-indigo-700 font-medium hover:bg-indigo-50 rounded-3xl transition-colors">
          New Payment →
        </button>
      </div>
    </div>
  </div>

  <!-- Footer Credit -->
  <div class="text-center py-8 border-t border-slate-100 text-xs text-slate-400">
    Developed by <span class="text-indigo-700 font-medium">NangaNet Systems</span>
    <span class="inline-block w-1 h-1 bg-teal-500 rounded-full mx-1.5"></span>
    Smart Digital Solutions
  </div>

  <script src="script.js"></script>
</body>
</html>
