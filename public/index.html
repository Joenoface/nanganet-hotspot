<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NangaNet • Hotspot Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    /* Glossy Button Style */
    .gloss-btn {
      background: linear-gradient(145deg, #4338ca, #6366f1);
      box-shadow: 0 10px 20px -5px rgb(67 56 202 / 0.4),
                  inset 0 2px 0 rgba(255,255,255,0.4),
                  inset 0 -3px 0 rgba(0,0,0,0.2);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gloss-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px -5px rgb(67 56 202 / 0.5),
                  inset 0 2px 0 rgba(255,255,255,0.5);
    }
    .gloss-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .package-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .package-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
    .selected {
      border-color: #14b8a6 !important;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.2);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div class="max-w-md mx-auto w-full px-5 py-10 flex-1">
    <div class="flex items-center justify-center gap-3 mb-10">
      <div class="w-11 h-11 bg-gradient-to-br from-indigo-700 to-indigo-600 rounded-3xl flex items-center justify-center text-white text-3xl font-bold shadow-lg">N</div>
      <div>
        <div class="text-4xl font-bold tracking-tighter text-slate-900">NangaNet</div>
        <div class="text-teal-500 text-sm font-medium -mt-1">HOTSPOT</div>
      </div>
    </div>

    <h1 class="text-center text-3xl font-semibold text-slate-900 mb-2">Instant Access</h1>
    <p class="text-center text-slate-600 mb-10">Choose • Pay with M-Pesa • Connect instantly</p>

    <!-- Packages -->
    <div id="package-screen">
      <div class="mb-8">
        <div class="flex items-center gap-2 mb-4">
          <div class="h-px flex-1 bg-gradient-to-r from-transparent via-teal-200 to-transparent"></div>
          <span class="text-sm font-semibold text-teal-600 tracking-widest">PACKAGES</span>
          <div class="h-px flex-1 bg-gradient-to-r from-transparent via-teal-200 to-transparent"></div>
        </div>
        <div id="packages" class="space-y-4"></div>
      </div>

      <div class="mt-8">
        <label class="block text-slate-600 text-sm font-medium mb-2">M-Pesa Number</label>
        <input id="phone" type="tel" maxlength="12" placeholder="0712345678"
               class="w-full px-6 py-4 bg-white border border-slate-200 focus:border-teal-500 rounded-3xl text-lg focus:ring-4 focus:ring-teal-100 outline-none">
      </div>

      <button onclick="initiatePayment()" id="payBtn"
              class="gloss-btn w-full mt-8 py-5 text-white font-semibold text-xl rounded-3xl flex items-center justify-center gap-3 shadow-xl">
        <span>Pay KES</span>
        <span id="payAmount" class="font-bold text-2xl">0</span>
        <i class="fa-solid fa-bolt"></i>
      </button>
    </div>

    <!-- Status Screen -->
    <div id="status-screen" class="hidden">
      <div class="bg-white rounded-3xl shadow-xl p-10 text-center">
        <div id="status-icon" class="mx-auto mb-6"></div>
        <div id="status-text" class="text-3xl font-semibold mb-2"></div>
        <div id="voucher" class="hidden mt-12 bg-slate-50 border border-teal-100 rounded-2xl p-8">
          <div class="text-emerald-600 font-medium flex items-center justify-center gap-2 mb-6">
            <i class="fa-solid fa-circle-check text-2xl"></i>
            PAYMENT SUCCESSFUL
          </div>
          <div class="grid grid-cols-2 gap-y-8 text-left">
            <div><div class="text-xs text-slate-500 tracking-widest">USERNAME</div><div id="v-username" class="font-mono text-2xl font-bold"></div></div>
            <div><div class="text-xs text-slate-500 tracking-widest">PASSWORD</div><div id="v-password" class="font-mono text-2xl font-bold"></div></div>
          </div>
          <div class="mt-10 text-center">
            <div class="text-xs text-slate-500">Expires</div>
            <div id="v-expiry" class="font-semibold text-slate-800"></div>
          </div>
        </div>
        <button onclick="location.reload()" class="mt-12 text-indigo-600 font-medium hover:text-indigo-700">New Payment →</button>
      </div>
    </div>
  </div>

  <div class="text-center py-6 text-xs text-slate-400">
    Developed by <span class="text-indigo-700 font-medium">NangaNet Systems</span>
    <span class="inline-block w-1 h-1 bg-teal-500 rounded-full mx-1"></span> 2026
  </div>

  <script src="script.js"></script>
</body>
</html>
